version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: code-vault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: code_vault
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - code-vault-mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../sql/test-data.sql:/docker-entrypoint-initdb.d/02-test-data.sql
      - ../sql/extra-data.sql:/docker-entrypoint-initdb.d/03-extra-data.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    networks:
      - code-vault-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: code-vault-redis
    ports:
      - "6379:6379"
    volumes:
      - code-vault-redis-data:/data
    networks:
      - code-vault-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  code-vault-mysql-data:
  code-vault-redis-data:

networks:
  code-vault-network:
    name: code-vault-network